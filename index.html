<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raid Planner</title>
<style>
body { background:#0f0f0f; color:#fff; font-family: Arial; padding:20px; }
.container { display:flex; gap:20px; }

.groups { flex:1; }
.group {
  background:#111;
  padding:10px;
  margin-bottom:20px;
  border:1px solid #333;
  min-height:200px;
}
.player {
  padding:5px;
  margin:3px 0;
  background:#222;
  cursor:grab;
}

.summary { width:400px; display:flex; flex-direction:column; gap:10px; }
.panel { background:#111; padding:10px; border:1px solid #333; }

.item strong { color:#a335ee; }
.highlight { color:#ff5555; }

.tooltip {
  position:absolute;
  background:#000;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  display:none;
  z-index:100;
}
</style>
</head>
<body>

<h1>Raid Planner</h1>

<div class="container">
  <div class="groups">
    <h2>Unassigned</h2>
    <div id="unassigned" class="group"></div>

    <h2>Group 1</h2>
    <div id="group1" class="group"></div>

    <h2>Group 2</h2>
    <div id="group2" class="group"></div>
  </div>

  <div class="summary">
    <div class="panel">
      <h3>Group 1 Needs</h3>
      <div id="summary1"></div>
    </div>
    <div class="panel">
      <h3>Group 2 Needs</h3>
      <div id="summary2"></div>
    </div>
  </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>

// 🔹 REPLACE THESE
const LOOT_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";
const RAID_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREW76caK79cfWH77Rw_c4xaS11POYR3WxoBff0EW6_8njw36DQGqE3dSLZNYliAHKR1F7drFS6wpbS/pub?output=csv";

let players = {};
let draggedPlayer = null;

// 🎨 Class colors
const classColors = {
  Warrior:"#C79C6E", Mage:"#69CCF0", Priest:"#FFFFFF",
  Druid:"#FF7D0A", Rogue:"#FFF569", Hunter:"#ABD473",
  Paladin:"#F58CBA", Shaman:"#0070DE", Warlock:"#9482C9"
};

// ---------------- CSV PARSER
function parseCSV(text) {
  return text.split("\n").map(line=>{
    let cols=[],cur="",q=false;
    for(let c of line){
      if(c=='"') q=!q;
      else if(c==','&&!q){cols.push(cur);cur="";}
      else cur+=c;
    }
    cols.push(cur);
    return cols.map(v=>v.trim().replace(/^"|"$/g,""));
  });
}

// ---------------- LOAD BOTH
async function loadAll() {
  const [lootRes, raidRes] = await Promise.all([
    fetch(LOOT_CSV),
    fetch(RAID_CSV)
  ]);

  const lootRows = parseCSV(await lootRes.text());
  const raidRows = parseCSV(await raidRes.text());

  buildRaidData(raidRows);
  buildLootData(lootRows);

  renderAll();
}

// ---------------- RAID DATA
function buildRaidData(rows){
  const headers = rows[0];

  const nameI = headers.findIndex(h=>h.toLowerCase().includes("player") || h.toLowerCase().includes("name"));
  const classI= headers.findIndex(h=>h.toLowerCase().includes("class"));
  const specI = headers.findIndex(h=>h.toLowerCase().includes("spec"));
  const statusI=headers.findIndex(h=>h.toLowerCase().includes("status"));

  rows.slice(1).forEach(r=>{
    const name=r[nameI];
    const status=r[statusI];

    if(!name) return;

    // ❌ remove absent / not signed
    if(status && !status.toLowerCase().includes("accept")) return;

    players[name]={
      name,
      class:r[classI] || "Unknown",
      spec:r[specI] || "",
      group:"unassigned",
      needs:[]
    };
  });
}

// ---------------- LOOT DATA
function buildLootData(rows){
  const headers = rows[0];

  const nameI = headers.findIndex(h=>h.toLowerCase().includes("name"));
  const itemI = headers.findIndex(h=>h.toLowerCase().includes("item"));
  const statusI=headers.findIndex(h=>h.toLowerCase().includes("status"));

  rows.slice(1).forEach(r=>{
    const name=r[nameI];
    const item=r[itemI];
    const status=r[statusI];

    if(!players[name]) return; // ignore non-signed players

    if(status==="Need"){
      players[name].needs.push(item);
    }
  });
}

// ---------------- RENDER
function renderAll(){
  renderPlayers();
  renderSummaries();
}

// ---------------- PLAYERS
function renderPlayers(){
  ["unassigned","group1","group2"].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML="";
    el.ondragover=e=>e.preventDefault();
    el.ondrop=()=>dropPlayer(id);
  });

  Object.values(players).forEach(p=>{
    const div=document.createElement("div");
    div.className="player";
    div.innerText=`${p.name} (${p.needs.length})`;
    div.style.color=classColors[p.class] || "#fff";

    div.draggable=true;
    div.ondragstart=()=>draggedPlayer=p;

    div.onmouseenter=e=>showTooltip(e,p);
    div.onmouseleave=hideTooltip;

    document.getElementById(p.group).appendChild(div);
  });
}

// ---------------- DRAG
function dropPlayer(group){
  if(!draggedPlayer) return;
  draggedPlayer.group=group;
  renderAll();
}

// ---------------- TOOLTIP
function showTooltip(e,p){
  const t=document.getElementById("tooltip");
  t.innerHTML=`
    <b>${p.name}</b><br>
    ${p.class} ${p.spec}<br><br>
    ${p.needs.join("<br>") || "No needed items"}
  `;
  t.style.left=e.pageX+10+"px";
  t.style.top=e.pageY+10+"px";
  t.style.display="block";
}
function hideTooltip(){
  document.getElementById("tooltip").style.display="none";
}

// ---------------- SUMMARY
function buildSummary(group){
  const s={};
  Object.values(players)
    .filter(p=>p.group===group)
    .forEach(p=>{
      p.needs.forEach(item=>{
        if(!s[item]) s[item]=[];
        s[item].push(p.name);
      });
    });
  return s;
}

function renderSummary(id,data){
  const el=document.getElementById(id);
  el.innerHTML="";

  Object.entries(data)
    .sort((a,b)=>b[1].length-a[1].length)
    .forEach(([item,list])=>{
      const div=document.createElement("div");
      const h=list.length>=3?"highlight":"";
      div.innerHTML=`
        <strong class="${h}">${item}</strong> (${list.length})
        <br>${list.join(", ")}
      `;
      el.appendChild(div);
    });
}

function renderSummaries(){
  renderSummary("summary1", buildSummary("group1"));
  renderSummary("summary2", buildSummary("group2"));
}

// ----------------
loadAll();

</script>

</body>
</html>
