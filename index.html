<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raid Planner - Merged System</title>
<style>
body { background:#0f0f0f; color:#fff; font-family: Arial, sans-serif; padding:20px; }
h1,h2 { color:#ffd100; }
.container { display:flex; gap:20px; }
/* Groups */
.groups { flex:1; }
.group { background:#111; padding:10px; margin-bottom:20px; border:1px solid #333; min-height:200px; }
.player { padding:5px; margin:3px 0; background:#222; cursor:grab; color:#a335ee; }
.player:hover { background:#333; }
.player.dragging { opacity:0.5; }
/* Summary */
.summary { width:350px; background:#111; padding:10px; border:1px solid #333; }
.item { margin-bottom:10px; }
.item strong { color:#a335ee; }
.highlight { color:#ff5555; }
/* Tooltip */
.player[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  background:#222;
  color:#fff;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
  white-space: pre-line;
  z-index:1000;
}
</style>
</head>
<body>

<h1>Raid Planner - Merged System</h1>

<div class="container">
  <!-- GROUPS -->
  <div class="groups">
    <h2>Unassigned</h2>
    <div id="unassigned" class="group"></div>

    <h2>Group 1</h2>
    <div id="group1" class="group"></div>

    <h2>Group 2</h2>
    <div id="group2" class="group"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <h2>Items Needed</h2>
    <div id="summary"></div>
  </div>
</div>

<script>
// ---------- CONFIG ----------
// Replace these with your published CSV URLs
const RAID_HELPER_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";
const LOOT_CSV_URL        = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREW76caK79cfWH77Rw_c4xaS11POYR3WxoBff0EW6_8njw36DQGqE3dSLZNYliAHKR1F7drFS6wpbS/pub?output=csv";

let players = {}; // {name:{name, cls, spec, loot:[], group}}
let lootData = {}; // {item:[player1,player2,...]}

// ---------- CSV HELPER ----------
async function loadCSV(url) {
  const res = await fetch(url);
  const text = await res.text();
  const rows = text.split("\n").map(r => r.split(","));
  return rows;
}

// ---------- LOAD DATA ----------
async function loadData() {
  // 1️⃣ Roster
  const rosterRows = await loadCSV(RAID_HELPER_CSV_URL);
  rosterRows.slice(1).forEach(cols => {
    const name = cols[0]?.trim();
    const cls  = cols[1]?.trim();
    const spec = cols[2]?.trim();
    const status = cols[4]?.trim(); // adjust index if needed
    if (!name || !cls) return;
    if (status.toLowerCase() === "absent" || status.toLowerCase() === "bench") return;
    players[name] = { name, cls, spec, loot: [], group:"unassigned" };
  });

  // 2️⃣ Loot
  const lootRows = await loadCSV(LOOT_CSV_URL);
  lootRows.slice(1).forEach(cols => {
    const name = cols[0]?.trim();
    const item = cols[1]?.trim();
    const status = cols[2]?.trim();
    if (!players[name]) return; // skip non-roster
    if (status !== "Need") return;
    players[name].loot.push(item);
    if (!lootData[item]) lootData[item] = [];
    lootData[item].push(name);
  });

  renderPlayers();
  renderSummary();
}

// ---------- RENDER ----------
function renderPlayers() {
  ["unassigned","group1","group2"].forEach(g => document.getElementById(g).innerHTML = "");

  Object.values(players).forEach(p => {
    const div = document.createElement("div");
    div.className = "player";
    div.draggable = true;
    div.innerText = p.name + ` (${p.cls} ${p.spec})`;
    if (p.loot.length > 0) div.dataset.tooltip = p.loot.join("\n");

    div.addEventListener("dragstart", e => { div.classList.add("dragging"); e.dataTransfer.setData("text/plain", p.name); });
    div.addEventListener("dragend", e => { div.classList.remove("dragging"); });

    document.getElementById(p.group).appendChild(div);
  });

  // Setup drop zones
  ["unassigned","group1","group2"].forEach(id=>{
    const zone = document.getElementById(id);
    zone.addEventListener("dragover", e=> e.preventDefault());
    zone.addEventListener("drop", e=>{
      e.preventDefault();
      const name = e.dataTransfer.getData("text/plain");
      players[name].group = id;
      renderPlayers();
      renderSummary();
    });
  });
}

// ---------- SUMMARY ----------
function renderSummary() {
  const summary = { group1:{}, group2:{} };

  Object.values(players).forEach(p => {
    const g = p.group;
    if (g === "group1" || g === "group2") {
      p.loot.forEach(item => {
        if (!summary[g][item]) summary[g][item] = [];
        summary[g][item].push(p.name);
      });
    }
  });

  const container = document.getElementById("summary");
  container.innerHTML = "";

  ["group1","group2"].forEach(g=>{
    const header = document.createElement("h3");
    header.innerText = `Items Needed - ${g}`;
    container.appendChild(header);

    Object.entries(summary[g])
      .sort((a,b)=>b[1].length - a[1].length)
      .forEach(([item, names])=>{
        const div = document.createElement("div");
        div.className = "item";
        const highlight = names.length>=3 ? "highlight" : "";
        div.innerHTML = `<strong class="${highlight}">${item}</strong> (${names.length})<br>${names.join(", ")}`;
        container.appendChild(div);
      });
  });
}

// ---------- INIT ----------
loadData();
</script>

</body>
</html>
