<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raid Planner - Enhanced</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family: Arial;
  padding:20px;
}

.container {
  display:flex;
  gap:20px;
}

/* GROUPS */
.groups { flex:1; }
.group {
  background:#111;
  padding:10px;
  margin-bottom:20px;
  border:1px solid #333;
  min-height:200px;
}

/* PLAYER */
.player {
  padding:5px;
  margin:5px 0;
  background:#222;
  cursor:grab;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

/* LOOT COLORS */
.player.low { background:#1f3d1f; }
.player.medium { background:#4a3a1f; }
.player.high { background:#4a1f1f; }
.player.none { background:#2a2a2a; }

/* CLASS COLORS */
.warrior { border-left:4px solid #C79C6E; }
.mage { border-left:4px solid #69CCF0; }
.priest { border-left:4px solid #FFFFFF; }
.druid { border-left:4px solid #FF7D0A; }
.rogue { border-left:4px solid #FFF569; }
.hunter { border-left:4px solid #ABD473; }
.shaman { border-left:4px solid #0070DE; }
.paladin { border-left:4px solid #F58CBA; }
.warlock { border-left:4px solid #9482C9; }
.unknown { border-left:4px solid #555; }

/* SPEC ICON */
.spec-icon {
  width:20px;
  height:20px;
}

/* SUMMARY */
.summary {
  width:400px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.panel {
  background:#111;
  padding:10px;
  border:1px solid #333;
}
.summary a strong { color:#a335ee; }
.summary a .highlight { color:#ff5555; }

/* TOOLTIP */
.tooltip {
  position:absolute;
  background:#000;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<h1>Raid Planner</h1>

<div class="container">

  <div class="groups">
    <h2>Unassigned</h2>
    <div id="unassigned" class="group"></div>

    <h2>Group 1</h2>
    <div id="group1" class="group"></div>

    <h2>Group 2</h2>
    <div id="group2" class="group"></div>
  </div>

  <div class="summary">
    <div class="panel">
      <h3>Group 1 Needs</h3>
      <div id="summary1"></div>
    </div>
    <div class="panel">
      <h3>Group 2 Needs</h3>
      <div id="summary2"></div>
    </div>
  </div>

</div>

<div id="tooltip" class="tooltip"></div>

<script src="https://wow.zamimg.com/widgets/power.js"></script>

<script>

// ---------------- CSV ----------------
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";

// ---------------- SPEC ICONS ----------------
const specIcons = {
  "mage-arcane": "https://wow.zamimg.com/images/wow/icons/small/spell_holy_magicalsentry.jpg",
  "mage-fire": "https://wow.zamimg.com/images/wow/icons/small/spell_fire_firebolt02.jpg",
  "mage-frost": "https://wow.zamimg.com/images/wow/icons/small/spell_frost_frostbolt02.jpg",

  "warrior-arms": "https://wow.zamimg.com/images/wow/icons/small/ability_warrior_savageblow.jpg",
  "warrior-fury": "https://wow.zamimg.com/images/wow/icons/small/ability_warrior_innerrage.jpg",
  "warrior-protection": "https://wow.zamimg.com/images/wow/icons/small/ability_warrior_defensivestance.jpg",

  "priest-holy": "https://wow.zamimg.com/images/wow/icons/small/spell_holy_wordfortitude.jpg",
  "priest-shadow": "https://wow.zamimg.com/images/wow/icons/small/spell_shadow_shadowwordpain.jpg",

  "druid-resto": "https://wow.zamimg.com/images/wow/icons/small/spell_nature_healingtouch.jpg",
  "druid-feral": "https://wow.zamimg.com/images/wow/icons/small/ability_druid_catform.jpg",
  "druid-balance": "https://wow.zamimg.com/images/wow/icons/small/spell_nature_starfall.jpg"
};

// ---------------- DATA ----------------
let players = {};
let draggedPlayer = null;

// ---------------- CSV PARSER ----------------
function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  return rows;
}

// ---------------- LOAD ----------------
async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = parseCSV(text);

  const headers = rows[0];

  const playerIndex = headers.findIndex(h=>h.toLowerCase().includes("name"));
  const itemIndex = headers.findIndex(h=>h.toLowerCase().includes("item"));
  const statusIndex = headers.findIndex(h=>h.toLowerCase().includes("status"));

  rows.slice(1).forEach(cols=>{
    const player = cols[playerIndex];
    const item = cols[itemIndex];
    const status = cols[statusIndex];

    if (!player) return;

    if (!players[player]) {
      players[player] = {
        name: player,
        group: "unassigned",
        needs: [],
        class: "unknown",
        spec: ""
      };
    }

    if (status === "Need") players[player].needs.push(item);
  });

  renderAll();
}

// ---------------- RENDER ----------------
function renderAll() {
  renderPlayers();
  renderSummaries();
}

// ---------------- PLAYERS ----------------
function renderPlayers() {
  ["unassigned","group1","group2"].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML="";
    el.ondragover=e=>e.preventDefault();
    el.ondrop=()=>dropPlayer(id);
  });

  Object.values(players).forEach(p=>{
    const div=document.createElement("div");

    let tier="none";
    if (p.needs.length<=2) tier="low";
    else if (p.needs.length<=4) tier="medium";
    else tier="high";

    const className = p.class.toLowerCase();

    div.className = `player ${tier} ${className}`;

    // name
    const name = document.createElement("span");
    name.innerText = `${p.name} (${p.needs.length})`;

    // spec icon
    const icon = document.createElement("img");
    icon.className="spec-icon";

    const key = `${p.class}-${p.spec}`.toLowerCase();
    if (specIcons[key]) icon.src = specIcons[key];
    else icon.style.display="none";

    // class select
    const classSelect = document.createElement("select");
    classSelect.innerHTML = `
      <option value="unknown">Class</option>
      <option value="warrior">Warrior</option>
      <option value="mage">Mage</option>
      <option value="priest">Priest</option>
      <option value="druid">Druid</option>
      <option value="rogue">Rogue</option>
      <option value="hunter">Hunter</option>
      <option value="shaman">Shaman</option>
      <option value="paladin">Paladin</option>
      <option value="warlock">Warlock</option>
    `;
    classSelect.value = p.class;

    classSelect.onchange = (e)=>{
      p.class = e.target.value;
      p.spec = "";
      renderPlayers();
    };

    // spec select
    const specSelect = document.createElement("select");

    const specOptions = {
      mage:["arcane","fire","frost"],
      warrior:["arms","fury","protection"],
      priest:["holy","shadow"],
      druid:["resto","feral","balance"]
    };

    const specs = specOptions[p.class] || [];

    specSelect.innerHTML = `<option value="">Spec</option>` +
      specs.map(s=>`<option value="${s}">${s}</option>`).join("");

    specSelect.value = p.spec;

    specSelect.onchange = (e)=>{
      p.spec = e.target.value;
      renderPlayers();
    };

    // drag + tooltip
    div.draggable=true;
    div.ondragstart=()=>draggedPlayer=p;
    div.onmouseenter=e=>showTooltip(e,p);
    div.onmouseleave=hideTooltip;

    div.appendChild(icon);
    div.appendChild(name);
    div.appendChild(classSelect);
    div.appendChild(specSelect);

    document.getElementById(p.group).appendChild(div);
  });
}

// ---------------- DRAG ----------------
function dropPlayer(group) {
  if(!draggedPlayer) return;
  draggedPlayer.group = group;
  renderAll();
}

// ---------------- TOOLTIP ----------------
function showTooltip(e,p){
  const t=document.getElementById("tooltip");
  t.innerHTML = p.needs.join("<br>");
  t.style.left=e.pageX+10+"px";
  t.style.top=e.pageY+10+"px";
  t.style.display="block";
}
function hideTooltip(){document.getElementById("tooltip").style.display="none";}

// ---------------- SUMMARY ----------------
function buildSummary(group){
  const summary={};
  Object.values(players).filter(p=>p.group===group).forEach(p=>{
    p.needs.forEach(i=>{
      if(!summary[i]) summary[i]=[];
      summary[i].push(p.name);
    });
  });
  return summary;
}

function renderSummary(id,summary){
  const el=document.getElementById(id);
  el.innerHTML="";
  Object.entries(summary).forEach(([item,list])=>{
    const div=document.createElement("div");
    const red = list.length>=3 ? "highlight":"";
    div.innerHTML = `<strong class="${red}">${item}</strong> (${list.length})<br>${list.join(", ")}`;
    el.appendChild(div);
  });
}

function renderSummaries(){
  renderSummary("summary1", buildSummary("group1"));
  renderSummary("summary2", buildSummary("group2"));
}

// ---------------- INIT ----------------
loadData();

</script>

</body>
</html>
