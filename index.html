<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raid Planner - WoWHead Tooltips</title>
<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family: Arial;
  padding:20px;
}
.container {
  display:flex;
  gap:20px;
}

/* GROUPS */
.groups { flex:1; }
.group {
  background:#111;
  padding:10px;
  margin-bottom:20px;
  border:1px solid #333;
  min-height:200px;
}
.player {
  padding:5px;
  margin:3px 0;
  background:#222;
  cursor:grab;
}

/* SUMMARY */
.summary {
  width:400px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.panel {
  background:#111;
  padding:10px;
  border:1px solid #333;
}
/* ITEM COLORS */
.summary a strong { color:#a335ee; } /* default purple */
.summary a .highlight { color:#ff5555; } /* red when 3+ players need same item */

/* TOOLTIP */
.tooltip {
  position:absolute;
  background:#000;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  display:none;
  z-index:100;
}
</style>
</head>
<body>

<h1>Raid Planner</h1>

<div class="container">

  <div class="groups">
    <h2>Unassigned</h2>
    <div id="unassigned" class="group"></div>

    <h2>Group 1</h2>
    <div id="group1" class="group"></div>

    <h2>Group 2</h2>
    <div id="group2" class="group"></div>
  </div>

  <div class="summary">
    <div class="panel">
      <h3>Group 1 Needs</h3>
      <div id="summary1"></div>
    </div>
    <div class="panel">
      <h3>Group 2 Needs</h3>
      <div id="summary2"></div>
    </div>
  </div>

</div>

<div id="tooltip" class="tooltip"></div>

<!-- WoWHead Tooltips -->
<script src="https://wow.zamimg.com/widgets/power.js"></script>

<script>
// ---------------- CSV URL ----------------
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";

// Optional: Map item names → WoWHead IDs
const itemIDs = {
  "Gloves of Dexterous Manipulation": 28506,
  "Handwraps of Flowing Thought": 28507,
  "Vambraces of Courage": 28502,
  "Gauntlets of Renewed Hope": 28505,
  "Worgen Claw Necklace": 28509,
  "Gloves of Saintly Blessings": 28508,
  "Edgewalker's Longboots": 28545,
  "Crimson Girdle of The Indomitable": 28566,
  "Boots of Valiance": 28569,
  "Brooch of Unquenchable Fury": 28530,
  "Barbed Choker of Discipline": 28516,
  "Iron Gauntlets of the Maiden": 28518,
  "Gloves of Centering": 28520,
  "Mitts of the Treemender": 28521,
  "Boots of Foretelling": 28517,
  "Bracers of Maliciousness": 28514,
  "Trial-Fire Trousers": 28594,
  "Ribbon of Sacrifice": 28590,
  "Ruby Slippers": 28585,
  "Blue Diamond Witchwand": 28588,
  "Earthsoul Leggings": 28591,
  "Gloves of the Fallen Hero": 29756,
  "Gloves of the Fallen Champion": 29757,
  "Gloves of the Fallen Defender": 29758,
  "Garona's Signet Ring": 28649,
  "Wrynn Dynasty Greaves": 28621,
  "Drape of the Dark Reavers": 28672,
  "Boots of the Incorrupt": 28663,
  "Tirisfal Wand of Ascendancy": 28673,
  "Gilded Thorium Cloak": 28660,
  "The Lighting Capacitor": 28785,
  "Cincture of Will": 28652,
  "Cord of Nature's Sustenance": 28655,
  "Terestian's Stranglestaff": 28658,
  "Pantaloons of Repentance": 28742,
  "Skulker's Greaves": 28741,
  "Mithril Band of the Unscarred": 28730,
  "Jewel of Infinite Posibilities": 28734,
  "Spiteblade": 28729,
  "Ring of Recurrence": 28753,
  "Bladed Shoulderpads of the Merciless": 28755,
  "Girdle of Treachery": 28750,
  "Forestlord Striders": 28752,
  "Fiend Slayer Boots": 28746,
  "King's Defender": 28749,
  "Helm of the Fallen Hero": 29759,
  "Helm of the Fallen Champion": 29760,
  "Helm of the Fallen Defender": 29761,
  "Ruby Drape of the Mysticant": 28766,
  "Stainless Cloak of the Pure Hearted": 28765,
  "Ring of a Thousand Marks": 28757,
  "Jade Ring of the Everliving": 28763,
  "Sunfury Bow of the Phoenix": 28772,
  "The Decapitator": 28767,
  "Light's Justice": 28771,
  "Nathrezim Mindblade": 28770,
  "Emberspur Talisman": 28609,
  "Panzar'Thar Breastplate": 28597,
  "Ironstriders of Urgency": 28608
};

let allData = [];
let players = {};
let draggedPlayer = null;

// ---------------- CSV PARSER ----------------
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");
  for (let line of lines) {
    const cols = [];
    let current = "";
    let insideQuotes = false;
    for (let char of line) {
      if (char === '"') insideQuotes = !insideQuotes;
      else if (char === ',' && !insideQuotes) { cols.push(current); current=""; }
      else current+=char;
    }
    cols.push(current);
    rows.push(cols.map(c=>c.trim().replace(/^"|"$/g,"")));
  }
  return rows;
}

// ---------------- LOAD DATA ----------------
async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = parseCSV(text);
  const headers = rows[0];
  const playerIndex = headers.findIndex(h=>h.toLowerCase().includes("name"));
  const itemIndex   = headers.findIndex(h=>h.toLowerCase().includes("item"));
  const statusIndex = headers.findIndex(h=>h.toLowerCase().includes("status"));

  rows.slice(1).forEach(cols=>{
    const player = cols[playerIndex];
    const item = cols[itemIndex];
    const status = cols[statusIndex];
    if (!player) return;

    if (!players[player]) players[player]={name:player, group:"unassigned", needs:[]};
    if (status==="Need") players[player].needs.push(item);
    allData.push({player,item,status});
  });

  renderAll();
}

// ---------------- RENDER ----------------
function renderAll() {
  renderPlayers();
  renderSummaries();
}

// ---------------- PLAYERS ----------------
function renderPlayers() {
  ["unassigned","group1","group2"].forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML="";
    el.ondragover=e=>e.preventDefault();
    el.ondrop=()=>dropPlayer(id);
  });

  Object.values(players).forEach(p=>{
    const div=document.createElement("div");
    div.className="player";
    div.innerText = `${p.name} (${p.needs.length})`;
    div.draggable=true;

    div.ondragstart=()=>draggedPlayer=p;

    div.onmouseenter=e=>showTooltip(e,p);
    div.onmouseleave=hideTooltip;

    document.getElementById(p.group).appendChild(div);
  });
}

// ---------------- DRAG DROP ----------------
function dropPlayer(group) {
  if(!draggedPlayer) return;
  draggedPlayer.group = group;
  renderAll();
}

// ---------------- TOOLTIP ----------------
function showTooltip(e,player){
  const tooltip=document.getElementById("tooltip");
  tooltip.innerHTML = player.needs.length ? player.needs.join("<br>") : "No needed items";
  tooltip.style.left = e.pageX + 10 + "px";
  tooltip.style.top = e.pageY + 10 + "px";
  tooltip.style.display="block";
}
function hideTooltip(){document.getElementById("tooltip").style.display="none";}

// ---------------- SUMMARY ----------------
function buildSummary(groupName){
  const summary={};
  Object.values(players)
    .filter(p=>p.group===groupName)
    .forEach(p=>{
      p.needs.forEach(item=>{
        if(!summary[item]) summary[item]=[];
        summary[item].push(p.name);
      });
    });
  return summary;
}

function renderSummary(containerId, summary){
  const container=document.getElementById(containerId);
  container.innerHTML="";
  Object.entries(summary)
    .sort((a,b)=>b[1].length - a[1].length)
    .forEach(([item,list])=>{
      const div=document.createElement("div");
      const highlightClass = list.length >= 3 ? "highlight" : "";
      const id = itemIDs[item]||0;

      div.innerHTML = `
        <a href="https://www.wowhead.com/tbc/item=${id}" 
           data-wowhead="item=${id}" target="_blank">
          <strong class="${highlightClass}">${item}</strong>
        </a> (${list.length})
        <br>${list.join(", ")}
      `;
      container.appendChild(div);
    });

  if(window.$WowheadPower) $WowheadPower.refreshLinks();
}

function renderSummaries(){
  renderSummary("summary1", buildSummary("group1"));
  renderSummary("summary2", buildSummary("group2"));
}

// ---------------- INIT ----------------
loadData();

<script>
// ---------------- CONFIG ----------------
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";
const RAID_JSON_URL = "https://raid-helper.xyz/api/v4/events/1490979927376527471"; // local file or hosted

// ---------------- HELPERS ----------------
function normalizeName(name) {
  return name.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, "");
}

function similarity(a, b) {
  a = normalizeName(a);
  b = normalizeName(b);

  if (a === b) return 1;

  let matches = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }

  return matches / Math.max(a.length, b.length);
}

function findBestMatch(name, raidNames) {
  let best = null;
  let bestScore = 0;

  raidNames.forEach(rn => {
    const score = similarity(name, rn);
    if (score > bestScore) {
      bestScore = score;
      best = rn;
    }
  });

  return bestScore > 0.7 ? best : null;
}

// ---------------- LOAD DATA ----------------
async function loadAllData() {

  // --- LOAD CSV (BIS)
  const csvRes = await fetch(CSV_URL);
  const csvText = await csvRes.text();
  const rows = parseCSV(csvText);
  const headers = rows[0];

  const playerIndex = headers.findIndex(h=>h.toLowerCase().includes("name"));
  const itemIndex   = headers.findIndex(h=>h.toLowerCase().includes("item"));
  const statusIndex = headers.findIndex(h=>h.toLowerCase().includes("status"));

  let bisPlayers = {};

  rows.slice(1).forEach(cols=>{
    const name = cols[playerIndex];
    const item = cols[itemIndex];
    const status = cols[statusIndex];
    if (!name) return;

    if (!bisPlayers[name]) {
      bisPlayers[name] = { name, needs: [] };
    }

    if (status === "Need") {
      bisPlayers[name].needs.push(item);
    }
  });

  // --- LOAD RAID HELPER JSON
  const raidRes = await fetch(RAID_JSON_URL);
  const raidData = await raidRes.json();

  // Adjust depending on structure
  const signups = raidData.signups || raidData.data || [];

  // Filter accepted players
  const raidPlayers = signups
    .filter(p => p.status === "accepted" || p.status === "confirmed")
    .map(p => ({
      name: p.name || p.username,
      class: p.class || "unknown",
      spec: p.spec || ""
    }));

  const raidNames = raidPlayers.map(p => p.name);

  // ---------------- MERGE ----------------
  let players = {};

  Object.values(bisPlayers).forEach(bp => {
    const match = findBestMatch(bp.name, raidNames);

    if (!match) return; // skip non-raiders

    const raidInfo = raidPlayers.find(r => r.name === match);

    players[match] = {
      name: match,
      group: "unassigned",
      needs: bp.needs,
      class: raidInfo.class,
      spec: raidInfo.spec
    };
  });

  return players;
}

// ---------------- INIT ----------------
let players = {};
let draggedPlayer = null;

async function init() {
  players = await loadAllData();
  renderAll();
}

init();
</script>

</body>
</html>
