<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raid Planner</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family: Arial;
  padding:20px;
}

.container {
  display:flex;
  gap:20px;
}

/* GROUPS */
.groups { flex:1; }
.group {
  background:#111;
  padding:10px;
  margin-bottom:20px;
  border:1px solid #333;
  min-height:200px;
}

/* PLAYER */
.player {
  padding:6px;
  margin:4px 0;
  background:#1a1a1a;
  cursor:grab;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CLASS COLORS (TEXT) */
.name.warrior { color:#C79C6E; }
.name.mage { color:#69CCF0; }
.name.priest { color:#FFFFFF; }
.name.druid { color:#FF7D0A; }
.name.rogue { color:#FFF569; }
.name.hunter { color:#ABD473; }
.name.shaman { color:#0070DE; }
.name.paladin { color:#F58CBA; }
.name.warlock { color:#9482C9; }
.name.unknown { color:#aaa; }

/* SUMMARY */
.summary {
  width:400px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.panel {
  background:#111;
  padding:10px;
  border:1px solid #333;
}

/* ITEM COLORS */
.summary a strong { color:#a335ee; }
.summary a .highlight { color:#ff5555; }

/* TOOLTIP */
.tooltip {
  position:absolute;
  background:#000;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  display:none;
  z-index:100;
}
</style>
</head>

<body>

<h1>Raid Planner</h1>

<div class="container">

  <div class="groups">
    <h2>Unassigned</h2>
    <div id="unassigned" class="group"></div>

    <h2>Group 1</h2>
    <div id="group1" class="group"></div>

    <h2>Group 2</h2>
    <div id="group2" class="group"></div>
  </div>

  <div class="summary">
    <div class="panel">
      <h3>Group 1 Needs</h3>
      <div id="summary1"></div>
    </div>

    <div class="panel">
      <h3>Group 2 Needs</h3>
      <div id="summary2"></div>
    </div>
  </div>

</div>

<div id="tooltip" class="tooltip"></div>

<!-- WoWHead -->
<script src="https://wow.zamimg.com/widgets/power.js"></script>

<script>

// ---------------- CSV ----------------
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRFTam90fBXpoZWYRvRRvCK6-WvB6pu9aGVlhYlzKTMYUiAYHr9VZ-S0Gtk5S0ZHT-8Mho_-kXT9H51/pub?output=csv";

// ---------------- ITEM IDs ----------------
const itemIDs = {
  "Gloves of Dexterous Manipulation": 28506,
  "Handwraps of Flowing Thought": 28507,
  "Vambraces of Courage": 28502,
  "Gauntlets of Renewed Hope": 28505,
  "Worgen Claw Necklace": 28509,
  "Gloves of Saintly Blessings": 28508,
  "Edgewalker's Longboots": 28545,
  "Crimson Girdle of The Indomitable": 28566,
  "Boots of Valiance": 28569,
  "Brooch of Unquenchable Fury": 28530,
  "Barbed Choker of Discipline": 28516,
  "Iron Gauntlets of the Maiden": 28518,
  "Gloves of Centering": 28520,
  "Mitts of the Treemender": 28521,
  "Boots of Foretelling": 28517,
  "Bracers of Maliciousness": 28514,
  "Trial-Fire Trousers": 28594,
  "Ribbon of Sacrifice": 28590,
  "Ruby Slippers": 28585,
  "Blue Diamond Witchwand": 28588,
  "Earthsoul Leggings": 28591,
  "Gloves of the Fallen Hero": 29756,
  "Gloves of the Fallen Champion": 29757,
  "Gloves of the Fallen Defender": 29758,
  "Garona's Signet Ring": 28649,
  "Wrynn Dynasty Greaves": 28621,
  "Drape of the Dark Reavers": 28672,
  "Boots of the Incorrupt": 28663,
  "Tirisfal Wand of Ascendancy": 28673,
  "Gilded Thorium Cloak": 28660,
  "The Lighting Capacitor": 28785,
  "Cincture of Will": 28652,
  "Cord of Nature's Sustenance": 28655,
  "Terestian's Stranglestaff": 28658,
  "Pantaloons of Repentance": 28742,
  "Skulker's Greaves": 28741,
  "Mithril Band of the Unscarred": 28730,
  "Jewel of Infinite Posibilities": 28734,
  "Spiteblade": 28729,
  "Ring of Recurrence": 28753,
  "Bladed Shoulderpads of the Merciless": 28755,
  "Girdle of Treachery": 28750,
  "Forestlord Striders": 28752,
  "Fiend Slayer Boots": 28746,
  "King's Defender": 28749,
  "Helm of the Fallen Hero": 29759,
  "Helm of the Fallen Champion": 29760,
  "Helm of the Fallen Defender": 29761,
  "Ruby Drape of the Mysticant": 28766,
  "Stainless Cloak of the Pure Hearted": 28765,
  "Ring of a Thousand Marks": 28757,
  "Jade Ring of the Everliving": 28763,
  "Sunfury Bow of the Phoenix": 28772,
  "The Decapitator": 28767,
  "Light's Justice": 28771,
  "Nathrezim Mindblade": 28770,
  "Emberspur Talisman": 28609,
  "Panzar'Thar Breastplate": 28597,
  "Ironstriders of Urgency": 28608
};

// ---------------- DATA ----------------
let players = {};
let draggedPlayer = null;

// ---------------- CSV PARSER ----------------
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");

  for (let line of lines) {
    const cols = [];
    let current = "";
    let insideQuotes = false;

    for (let char of line) {
      if (char === '"') insideQuotes = !insideQuotes;
      else if (char === ',' && !insideQuotes) {
        cols.push(current);
        current = "";
      } else current += char;
    }

    cols.push(current);
    rows.push(cols.map(c => c.trim().replace(/^"|"$/g, "")));
  }

  return rows;
}

// ---------------- LOAD ----------------
async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();

  const rows = parseCSV(text);
  const headers = rows[0];

  const playerIndex = headers.findIndex(h => h.toLowerCase().includes("name"));
  const itemIndex   = headers.findIndex(h => h.toLowerCase().includes("item"));
  const statusIndex = headers.findIndex(h => h.toLowerCase().includes("status"));

  rows.slice(1).forEach(cols => {
    const player = cols[playerIndex];
    const item   = cols[itemIndex];
    const status = cols[statusIndex];

    if (!player) return;

    if (!players[player]) {
      players[player] = {
        name: player,
        group: "unassigned",
        needs: [],
        class: "unknown"
      };
    }

    if (status === "Need") {
      players[player].needs.push(item);
    }
  });

  renderAll();
}

// ---------------- RENDER ----------------
function renderAll() {
  renderPlayers();
  renderSummaries();
}

// ---------------- PLAYERS ----------------
function renderPlayers() {
  ["unassigned","group1","group2"].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = "";
    el.ondragover = e => e.preventDefault();
    el.ondrop = () => dropPlayer(id);
  });

  Object.values(players).forEach(p => {
    const div = document.createElement("div");
    div.className = "player";

    const name = document.createElement("span");
    name.className = "name " + (p.class || "unknown");
    name.innerText = `${p.name} (${p.needs.length})`;

    const select = document.createElement("select");
    select.innerHTML = `
      <option value="unknown">Class</option>
      <option value="warrior">Warrior</option>
      <option value="mage">Mage</option>
      <option value="priest">Priest</option>
      <option value="druid">Druid</option>
      <option value="rogue">Rogue</option>
      <option value="hunter">Hunter</option>
      <option value="shaman">Shaman</option>
      <option value="paladin">Paladin</option>
      <option value="warlock">Warlock</option>
    `;

    select.value = p.class;

    select.onchange = (e) => {
      p.class = e.target.value;
      renderPlayers();
    };

    div.draggable = true;
    div.ondragstart = () => draggedPlayer = p;

    div.onmouseenter = e => showTooltip(e, p);
    div.onmouseleave = hideTooltip;

    div.appendChild(name);
    div.appendChild(select);

    document.getElementById(p.group).appendChild(div);
  });
}

// ---------------- DRAG ----------------
function dropPlayer(group) {
  if (!draggedPlayer) return;
  draggedPlayer.group = group;
  renderAll();
}

// ---------------- TOOLTIP ----------------
function showTooltip(e, player) {
  const tooltip = document.getElementById("tooltip");
  tooltip.innerHTML = player.needs.length
    ? player.needs.join("<br>")
    : "No needed items";

  tooltip.style.left = e.pageX + 10 + "px";
  tooltip.style.top = e.pageY + 10 + "px";
  tooltip.style.display = "block";
}

function hideTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

// ---------------- SUMMARY ----------------
function buildSummary(groupName) {
  const summary = {};

  Object.values(players)
    .filter(p => p.group === groupName)
    .forEach(p => {
      p.needs.forEach(item => {
        if (!summary[item]) summary[item] = [];
        summary[item].push(p.name);
      });
    });

  return summary;
}

function renderSummary(containerId, summary) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  Object.entries(summary)
    .sort((a,b)=>b[1].length - a[1].length)
    .forEach(([item, list]) => {
      const div = document.createElement("div");
      const highlightClass = list.length >= 3 ? "highlight" : "";
      const id = itemIDs[item] || 0;

      div.innerHTML = `
        <a href="https://www.wowhead.com/tbc/item=${id}" 
           data-wowhead="item=${id}" target="_blank">
          <strong class="${highlightClass}">${item}</strong>
        </a> (${list.length})
        <br>${list.join(", ")}
      `;

      container.appendChild(div);
    });

  if (window.$WowheadPower) $WowheadPower.refreshLinks();
}

function renderSummaries() {
  renderSummary("summary1", buildSummary("group1"));
  renderSummary("summary2", buildSummary("group2"));
}

// ---------------- INIT ----------------
loadData();

</script>

</body>
</html>
